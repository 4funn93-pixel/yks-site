<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="The Executive Dysfunction Survival Kit">
  <rect width="600" height="450" fill="#0e0e11"/>
  <g stroke="#1c1c21" stroke-width="1"><path d="M0 112H600M0 224H600M0 336H600"/></g>
  <text x="48" y="70" fill="#71717a" font-family="monospace" font-size="15" letter-spacing="4">WHEN STARTING IS HARD</text>

  <!-- survival kit box -->
  <rect x="222" y="150" width="156" height="118" rx="14" fill="#131316" stroke="#26262c" stroke-width="2"/>
  <!-- handle -->
  <path d="M270 150 v-12 a30 30 0 0 1 60 0 v12" fill="none" stroke="#26262c" stroke-width="2"/>
  <!-- lime cross -->
  <rect x="291" y="186" width="18" height="46" rx="4" fill="#c7f73e"/>
  <rect x="277" y="200" width="46" height="18" rx="4" fill="#c7f73e"/>

  <!-- little tool chips around the kit -->
  <g font-family="monospace" font-size="11">
    <rect x="70" y="180" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="90" cy="195" r="4" fill="#fb7185"/><text x="102" y="199" fill="#a1a1aa">start tiny</text>

    <rect x="70" y="224" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="90" cy="239" r="4" fill="#38bdf8"/><text x="102" y="243" fill="#a1a1aa">brain dump</text>

    <rect x="412" y="180" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="432" cy="195" r="4" fill="#fbbf24"/><text x="444" y="199" fill="#a1a1aa">time it</text>

    <rect x="412" y="224" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="432" cy="239" r="4" fill="#34d399"/><text x="444" y="243" fill="#a1a1aa">mind spoons</text>
  </g>

  <text x="48" y="406" fill="#a1a1aa" font-family="sans-serif" font-size="25" font-weight="700">The Executive Dysfunction Survival Kit</text>
</svg>
