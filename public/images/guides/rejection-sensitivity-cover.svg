<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="Rejection Sensitivity: A Gentle Field Guide">
  <rect width="600" height="450" fill="#0e0e11"/>
  <g stroke="#1c1c21" stroke-width="1"><path d="M0 112H600M0 224H600M0 336H600"/></g>
  <text x="48" y="70" fill="#71717a" font-family="monospace" font-size="15" letter-spacing="4">WHEN A SMALL NO FEELS HUGE</text>

  <!-- ripples: the feeling, amplified -->
  <g fill="none" stroke="#26262c" stroke-width="2" stroke-dasharray="4 6">
    <circle cx="300" cy="184" r="70"/>
    <circle cx="300" cy="184" r="94"/>
  </g>

  <!-- heart: lime -->
  <path d="M300 232 C300 232 250 198 250 166 C250 145 269 133 286 145 C295 151 300 164 300 164 C300 164 305 151 314 145 C331 133 350 145 350 166 C350 198 300 232 300 232 Z" fill="#c7f73e"/>

  <!-- coping chips -->
  <g font-family="monospace" font-size="11">
    <rect x="70" y="170" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="90" cy="185" r="4" fill="#fb7185"/><text x="102" y="189" fill="#a1a1aa">pause</text>

    <rect x="70" y="214" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="90" cy="229" r="4" fill="#38bdf8"/><text x="102" y="233" fill="#a1a1aa">name it</text>

    <rect x="412" y="170" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="432" cy="185" r="4" fill="#fbbf24"/><text x="444" y="189" fill="#a1a1aa">is it true?</text>

    <rect x="412" y="214" width="118" height="30" rx="15" fill="#131316" stroke="#26262c"/>
    <circle cx="432" cy="229" r="4" fill="#34d399"/><text x="444" y="233" fill="#a1a1aa">be kind</text>
  </g>

  <text x="48" y="406" fill="#a1a1aa" font-family="sans-serif" font-size="25" font-weight="700">Rejection Sensitivity: A Gentle Field Guide</text>
</svg>
