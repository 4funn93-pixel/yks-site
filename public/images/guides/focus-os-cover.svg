<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="The Focus OS productivity system">
  <rect width="600" height="450" fill="#0e0e11"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c7f73e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c7f73e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="450" fill="url(#glow)"/>
  <text x="48" y="70" fill="#c7f73e" font-family="monospace" font-size="15" letter-spacing="4">PREMIUM SYSTEM</text>
  <!-- orbit system: central focus node + satellites (habits, calendar, review) -->
  <g transform="translate(300,225)" fill="none" stroke="#26262c" stroke-width="1.5">
    <ellipse rx="150" ry="80"/>
    <ellipse rx="150" ry="80" transform="rotate(60)"/>
    <ellipse rx="150" ry="80" transform="rotate(120)"/>
  </g>
  <g transform="translate(300,225)">
    <circle r="34" fill="#c7f73e"/>
    <text x="0" y="6" fill="#0e0e11" font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle">FOCUS</text>
    <!-- satellite nodes -->
    <g fill="#131316" stroke="#84cc16" stroke-width="2">
      <circle cx="150" cy="0" r="14"/>
      <circle cx="-75" cy="-110" r="14"/>
      <circle cx="-75" cy="110" r="14"/>
      <circle cx="75" cy="-110" r="14"/>
      <circle cx="75" cy="110" r="14"/>
      <circle cx="-150" cy="0" r="14"/>
    </g>
  </g>
  <text x="48" y="408" fill="#f4f4f5" font-family="sans-serif" font-size="26" font-weight="700">The Focus OS</text>
</svg>
