<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" role="img" aria-label="Weekly reset planner">
  <rect width="600" height="450" fill="#0e0e11"/>
  <g stroke="#1c1c21" stroke-width="1"><path d="M0 90H600M0 180H600M0 270H600M0 360H600"/></g>
  <text x="48" y="70" fill="#71717a" font-family="monospace" font-size="15" letter-spacing="4">WEEKLY RESET</text>
  <!-- 7 day columns as bars of varied fill -->
  <g font-family="monospace" font-size="12" fill="#71717a" text-anchor="middle">
    <text x="76" y="300">M</text><text x="138" y="300">T</text><text x="200" y="300">W</text>
    <text x="262" y="300">T</text><text x="324" y="300">F</text><text x="386" y="300">S</text><text x="448" y="300">S</text>
  </g>
  <g>
    <rect x="60" y="130" width="32" height="150" rx="8" fill="#1a1a1f"/><rect x="60" y="200" width="32" height="80" rx="8" fill="#c7f73e"/>
    <rect x="122" y="130" width="32" height="150" rx="8" fill="#1a1a1f"/><rect x="122" y="170" width="32" height="110" rx="8" fill="#c7f73e"/>
    <rect x="184" y="130" width="32" height="150" rx="8" fill="#1a1a1f"/><rect x="184" y="150" width="32" height="130" rx="8" fill="#c7f73e"/>
    <rect x="246" y="130" width="32" height="150" rx="8" fill="#1a1a1f"/><rect x="246" y="210" width="32" height="70" rx="8" fill="#84cc16"/>
    <rect x="308" y="130" width="32" height="150" rx="8" fill="#1a1a1f"/><rect x="308" y="185" width="32" height="95" rx="8" fill="#c7f73e"/>
    <rect x="370" y="130" width="32" height="150" rx="8" fill="#1a1a1f"/><rect x="370" y="235" width="32" height="45" rx="8" fill="#84cc16"/>
    <rect x="432" y="130" width="32" height="150" rx="8" fill="#1a1a1f"/><rect x="432" y="220" width="32" height="60" rx="8" fill="#84cc16"/>
  </g>
  <!-- circular reset arrow -->
  <g transform="translate(505,160)">
    <path d="M0 -34 A34 34 0 1 1 -24 -24" fill="none" stroke="#c7f73e" stroke-width="6" stroke-linecap="round"/>
    <path d="M-24 -36 l0 14 l14 0" fill="none" stroke="#c7f73e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="48" y="392" fill="#a1a1aa" font-family="sans-serif" font-size="26" font-weight="700">The Weekly Reset</text>
</svg>
