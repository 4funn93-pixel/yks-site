<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Why most productivity systems fail">
  <rect width="1200" height="630" fill="#0e0e11"/>
  <g stroke="#1c1c21" stroke-width="1"><path d="M0 158H1200M0 472H1200"/></g>
  <text x="80" y="120" fill="#c7f73e" font-family="monospace" font-size="22" letter-spacing="6">PRODUCTIVITY · YKS</text>
  <text x="80" y="300" fill="#f4f4f5" font-family="sans-serif" font-size="64" font-weight="700">Why most productivity</text>
  <text x="80" y="372" fill="#f4f4f5" font-family="sans-serif" font-size="64" font-weight="700">systems fail</text>
  <!-- loop with a break -->
  <g transform="translate(150,500)" fill="none" stroke-width="8" stroke-linecap="round">
    <path d="M0 0 A60 40 0 1 1 86 22" stroke="#c7f73e"/>
    <path d="M86 22 l-22 -6 l4 22" stroke="#c7f73e" stroke-linejoin="round"/>
